apiVersion: v1
kind: Secret
metadata:
  name: smartcart-secrets
type: Opaque
stringData:
  TOKEN_SECRET: replace-with-long-secret
  INTERNAL_API_KEY: replace-with-internal-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/OWNER/REPO/auth-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: smartcart-secrets
                  key: TOKEN_SECRET
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartcart-secrets
                  key: INTERNAL_API_KEY
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8004
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: ghcr.io/OWNER/REPO/catalog-service:latest
          ports:
            - containerPort: 8002
          env:
            - name: PORT
              value: "8002"
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8004
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartcart-secrets
                  key: INTERNAL_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
spec:
  selector:
    app: catalog-service
  ports:
    - port: 8002
      targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ghcr.io/OWNER/REPO/order-service:latest
          ports:
            - containerPort: 8003
          env:
            - name: PORT
              value: "8003"
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8001
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:8002
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8004
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartcart-secrets
                  key: INTERNAL_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 8003
      targetPort: 8003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/OWNER/REPO/notification-service:latest
          ports:
            - containerPort: 8004
          env:
            - name: PORT
              value: "8004"
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8001
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartcart-secrets
                  key: INTERNAL_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 8004
      targetPort: 8004
